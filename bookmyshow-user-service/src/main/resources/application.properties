spring.application.name=bookmyshow-user-service
server.port=8089

spring.datasource.url=jdbc:mysql://localhost:3306/bookmyshow_user
spring.datasource.username=root
spring.datasource.password=${DB_PASSWORD:root}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8080/realms/bookmyshow

