spring.application.name=bookmyshow-show-service
server.port=8086

spring.datasource.url=jdbc:mysql://localhost:3306/bookmyshow_show
spring.datasource.username=root
spring.datasource.password=${DB_PASSWORD:root}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8080/realms/bookmyshow

# Until split complete, call modulith for movie/theatre/seat/ticket
app.internal.base-url=http://localhost:8081

services.auth.token-url=http://localhost:8080/realms/bookmyshow/protocol/openid-connect/token
services.auth.client-id=bookmyshow-admin
services.auth.client-secret=${KEYCLOAK_CLIENT_SECRET:change-me}
