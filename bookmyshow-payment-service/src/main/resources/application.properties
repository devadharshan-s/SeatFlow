spring.application.name=bookmyshow-payment-service
server.port=8084

debug=true
spring.datasource.url=jdbc:mysql://localhost:3306/bookmyshow_payment
spring.datasource.username=root
spring.datasource.password=${DB_PASSWORD:root}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Stripe
payment.stripe.secret-key=${STRIPE_SECRET_KEY:}
payment.stripe.webhook-secret=${STRIPE_WEBHOOK_SECRET:}
payment.stripe.return-url=http://localhost:8084/payments/return

# Booking service for ticket validation
services.booking.base-url=http://localhost:8085



services.auth.token-url=http://localhost:8080/realms/bookmyshow/protocol/openid-connect/token
services.auth.client-id=bookmyshow-admin
services.auth.client-secret=${KEYCLOAK_CLIENT_SECRET:change-me}
